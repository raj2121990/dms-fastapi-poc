<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    .box { fill: #f5f7ff; stroke: #4b6cf7; stroke-width: 2; rx: 10; }
    .diamond { fill: #fff6db; stroke: #f59c1a; stroke-width: 2; }
    .text { font-family: Arial, sans-serif; font-size: 14px; fill: #111827; }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #111827; }
    .arrow { fill: none; stroke: #4b6cf7; stroke-width: 2; marker-end: url(#arrowhead); }
    .section { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #0f172a; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b6cf7" />
    </marker>
  </defs>

  <text x="600" y="30" text-anchor="middle" class="title">Document Management Flow</text>

  <rect x="50" y="60" width="220" height="60" class="box" />
  <text x="160" y="95" text-anchor="middle" class="text">Client</text>
  <text x="160" y="115" text-anchor="middle" class="text">(Upload/Search/Download)</text>

  <rect x="350" y="60" width="220" height="60" class="box" />
  <text x="460" y="95" text-anchor="middle" class="text">API Server</text>

  <line x1="270" y1="90" x2="350" y2="90" class="arrow" />

  <rect x="650" y="60" width="220" height="60" class="box" />
  <text x="760" y="95" text-anchor="middle" class="text">Temporary Local File</text>

  <line x1="570" y1="90" x2="650" y2="90" class="arrow" />

  <rect x="350" y="180" width="220" height="60" class="diamond" rx="20" ry="20" />
  <text x="460" y="205" text-anchor="middle" class="text">File size &lt;= threshold?</text>

  <line x1="760" y1="90" x2="760" y2="180" class="arrow" />

  <line x1="460" y1="120" x2="460" y2="180" class="arrow" />

  <rect x="50" y="300" width="220" height="60" class="box" />
  <text x="160" y="335" text-anchor="middle" class="text">Extract Text</text>
  <text x="160" y="355" text-anchor="middle" class="text">Synchronously</text>

  <rect x="350" y="300" width="260" height="60" class="box" />
  <text x="480" y="335" text-anchor="middle" class="text">Metadata status</text>
  <text x="480" y="355" text-anchor="middle" class="text">= processed</text>

  <rect x="700" y="300" width="260" height="60" class="box" />
  <text x="830" y="335" text-anchor="middle" class="text">Store File<br/>Configured Storage</text>

  <line x1="460" y1="240" x2="160" y2="300" class="arrow" />
  <line x1="460" y1="240" x2="520" y2="300" class="arrow" />
  <line x1="460" y1="240" x2="760" y2="300" class="arrow" />

  <rect x="50" y="420" width="220" height="60" class="box" />
  <text x="160" y="455" text-anchor="middle" class="text">Enqueue</text>
  <text x="160" y="475" text-anchor="middle" class="text">Celery task</text>

  <line x1="640" y1="240" x2="640" y2="420" class="arrow" />

  <rect x="350" y="520" width="220" height="60" class="box" />
  <text x="460" y="555" text-anchor="middle" class="text">Worker</text>
  <text x="460" y="575" text-anchor="middle" class="text">Processing</text>

  <rect x="700" y="520" width="260" height="60" class="box" />
  <text x="830" y="555" text-anchor="middle" class="text">Update metadata</text>
  <text x="830" y="575" text-anchor="middle" class="text">status=processed</text>

  <line x1="80" y1="420" x2="80" y2="520" class="arrow" />
  <line x1="470" y1="360" x2="470" y2="520" class="arrow" />
  <line x1="570" y1="360" x2="700" y2="560" class="arrow" />

  <rect x="50" y="620" width="320" height="80" class="box" />
  <text x="210" y="655" text-anchor="middle" class="section">Search Flow</text>
  <text x="210" y="680" text-anchor="middle" class="text">Client → API Server → Search Backend → Results</text>

  <rect x="450" y="620" width="320" height="80" class="box" />
  <text x="610" y="655" text-anchor="middle" class="section">Download Flow</text>
  <text x="610" y="680" text-anchor="middle" class="text">Client → API Server → Local/S3 response</text>

  <line x1="130" y1="120" x2="130" y2="210" class="arrow" />
  <line x1="550" y1="120" x2="550" y2="210" class="arrow" />
</svg>